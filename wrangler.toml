name = "autocount-sync-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
AUTOCOUNT_API_URL = "https://it-houzs.dev/"

[[d1_databases]]
binding = "DB"
database_name = "autocount-sync"
database_id = "d0401549-c099-407b-ae95-57a5f85e5ad5"

# R2 bucket for proof-of-delivery photos and signatures.
[[r2_buckets]]
binding = "POD_BUCKET"
bucket_name = "houzs-erp"

# Required secrets (set with `wrangler secret put`):
#   AUTOCOUNT_API_KEY
#   DASHBOARD_API_KEY
#   GOOGLE_MAPS_API_KEY  — used by the planner geocoder (Phase 2)

[triggers]
crons = [
  "*/5 * * * *",
  "0 2 * * *"
]

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]