name: Unify 2990 venue name
on:
  workflow_dispatch:
    inputs:
      target: { description: "Which DB", required: true, default: "staging", type: choice, options: [staging, prod] }
      apply:  { description: "1 to write, else DRY-RUN", required: false, default: "0", type: string }
      venue:  { description: "Target venue label", required: false, default: "2990s PJ", type: string }
concurrency: { group: "unify-2990-venue-${{ inputs.target }}", cancel-in-progress: false }
jobs:
  run-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci
      - run: node scripts/unify-2990-venue-name.mjs
        env: { APPLY: "${{ inputs.apply }}", TARGET: "${{ inputs.venue }}", DATABASE_URL: "${{ secrets.STAGING_DATABASE_URL }}" }
  run-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci
      - run: node scripts/unify-2990-venue-name.mjs
        env: { APPLY: "${{ inputs.apply }}", TARGET: "${{ inputs.venue }}", DATABASE_URL: "${{ secrets.DATABASE_URL }}" }
