name: Who are the US/CN creditors (read-only)
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Which database'
        required: true
        default: production
        type: choice
        options: [production, staging]
concurrency:
  group: who-are-ambiguous-phones
  cancel-in-progress: true
jobs:
  lookup:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target == 'production' && 'Production' || 'Staging' }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: node scripts/who-are-ambiguous-phones.mjs
        env:
          DATABASE_URL: ${{ inputs.target == 'production' && secrets.DATABASE_URL || secrets.STAGING_DATABASE_URL }}
          NODE_OPTIONS: --dns-result-order=ipv4first
