name: View grants diag (read-only)

# Manual, read-only. Prints owner/ACL/privilege-matrix for the payment-totals
# view vs its 0084 sibling, the 019x migration tracker rows, the role
# inventory, and RLS flags - the ground truth for the "permission denied for
# view" incident. No writes; output carries role names and ACLs only.
on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/diag-view-grants.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
