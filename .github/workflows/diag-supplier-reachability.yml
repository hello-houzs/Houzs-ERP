name: Supplier reachability diag (read-only)

# Answers "why do suppliers 404 in one company, and how bad is the
# cross-company / orphan supplier_id problem after the 2990 import" WITH
# EVIDENCE, without anyone opening a SQL console. Reports suppliers by
# company_id (incl NULL) and every orphan / cross-company supplier_id reference
# across scm tables. Strictly read-only (SELECT only).
#
# Manual trigger only — it is a question, not a gate, and a production DB read
# must never become routine CI noise. Actions already holds secrets.DATABASE_URL
# for the deploy, so nobody handles the credential.
on:
  workflow_dispatch:

# Own concurrency group — touches nothing, must never queue behind or displace a
# release.
concurrency:
  group: diag-supplier-reachability
  cancel-in-progress: true

jobs:
  diag:
    runs-on: ubuntu-latest
    # Same environment as the deploy, because that is where DATABASE_URL lives.
    environment: Production
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: node scripts/diag-supplier-reachability.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # GitHub-hosted runners have no IPv6 egress; match the deploy jobs.
          NODE_OPTIONS: --dns-result-order=ipv4first
