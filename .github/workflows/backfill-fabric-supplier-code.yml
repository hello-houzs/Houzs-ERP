name: Backfill fabric supplier_code (from 2990)

# Manual, one-shot. Restores scm.fabric_trackings.supplier_code (the supplier's
# OWN code for a fabric, e.g. PC151-01 for our BF-01) on HOUZS fabrics from the
# 2990 backend, after the 2026-06-22 removal left them NULL / self-referential.
# Non-clobbering: fills only blank / self-referential rows, never overwrites a
# real distinct value an operator set. Default DRY-RUN. apply=1 to write.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Destination DB"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod
      apply:
        description: "1 to write, else DRY-RUN"
        required: false
        default: "0"
        type: string

# Own concurrency group — never queues behind or displaces a deploy.
concurrency:
  group: backfill-fabric-supplier-code-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  backfill-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/backfill-fabric-supplier-code.mjs
        env:
          SOURCE_SUPABASE_URL: ${{ secrets.SOURCE_SUPABASE_URL }}
          SOURCE_SERVICE_ROLE_KEY: ${{ secrets.SOURCE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          APPLY: ${{ inputs.apply }}

  backfill-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/backfill-fabric-supplier-code.mjs
        env:
          SOURCE_SUPABASE_URL: ${{ secrets.SOURCE_SUPABASE_URL }}
          SOURCE_SERVICE_ROLE_KEY: ${{ secrets.SOURCE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APPLY: ${{ inputs.apply }}
