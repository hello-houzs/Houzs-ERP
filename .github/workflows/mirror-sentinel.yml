name: Mirror drift sentinel (2990 -> Houzs, read-only)

# Watches the one-way SO mirror (2990 public.sync_outbox -> Houzs
# scm.mfg_sales_orders WHERE company_id = 2) for a silent stall. Read-only:
# the script only SELECTs. When it detects an alarm condition it exits
# non-zero, this job fails, and the owner gets the standard failed-workflow
# email -- that IS the alarm (there is no other notifier today).
#
# Alarm conditions (see backend/scripts/mirror-drift-sentinel.mjs):
#   - outbox rows stuck (status <> 'done' and enqueued > 15 min ago)
#   - persisted drift: source SO count != mirrored count, once the delta has
#     outlived a drain cycle (stuck rows, or an empty pending+sent queue)
#   - no successful delivery for > 1 hour while rows are pending
#
# CREDENTIALS -- it now runs with the secrets this repo ALREADY has.
# This workflow asked for SENTINEL_2990_DB_URL + SENTINEL_HOUZS_DB_URL, two
# secrets nobody ever set, so every scheduled run since it landed printed SKIP
# and exited 0: green every 30 minutes, checking nothing. On 2026-07-17 the
# mirror was found at source=63 mirrored=62 -- one SO stuck for days, and the
# alarm built to catch exactly that had been reporting healthy throughout.
#
# It was never missing credentials, it was asking for the wrong ones:
# diag-2990.yml already reaches 2990 via SOURCE_SUPABASE_URL +
# SOURCE_SERVICE_ROLE_KEY and Houzs via DATABASE_URL, and a prod run the same
# day proved both live. Those are now passed as fallbacks, so this alarms today
# with no owner action. The SENTINEL_* pair still wins if ever set (a direct
# Postgres URL does the outbox aggregate in one query instead of four).
#
# NOTE: scheduled runs only fire from the repo's DEFAULT branch. To test on a
# feature branch first, use "Run workflow" (workflow_dispatch) and pick it.

on:
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes
  workflow_dispatch:

# Never let two checks overlap.
concurrency:
  group: mirror-sentinel
  cancel-in-progress: false

jobs:
  sentinel:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/mirror-drift-sentinel.mjs
        env:
          # Preferred (unset today): direct Postgres, one aggregate per side.
          SENTINEL_2990_DB_URL: ${{ secrets.SENTINEL_2990_DB_URL }}
          SENTINEL_HOUZS_DB_URL: ${{ secrets.SENTINEL_HOUZS_DB_URL }}
          # Fallbacks: the credentials diag-2990.yml already uses and that are
          # proven live against prod. These are what make the sentinel work now.
          SOURCE_SUPABASE_URL: ${{ secrets.SOURCE_SUPABASE_URL }}
          SOURCE_SERVICE_ROLE_KEY: ${{ secrets.SOURCE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
