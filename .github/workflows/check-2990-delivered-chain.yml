name: 2990 delivered-chain check (read-only)

# For every SO the 2990 source marked DELIVERED: does Houzs have the SO, its
# DOs (and their statuses), and any SI? Owner ruling 2026-07-24: status follows
# the SOP chain, so the fix (if any) is at the DO level, decided on this
# evidence — not a blind SO-status backfill.
on:
  workflow_dispatch:

concurrency:
  group: check-2990-delivered-chain
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    environment: Production
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: node scripts/check-2990-delivered-chain.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SOURCE_SUPABASE_URL: ${{ secrets.SOURCE_SUPABASE_URL }}
          SOURCE_SERVICE_ROLE_KEY: ${{ secrets.SOURCE_SERVICE_ROLE_KEY }}
          NODE_OPTIONS: --dns-result-order=ipv4first
