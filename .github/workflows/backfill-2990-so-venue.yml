name: Backfill 2990 SO venue (showroom)

# Manual. Stamps company_2 (2990) sales orders with the 2990 showroom's venue
# (mfg_sales_orders.venue_name + venue_source='SHOWROOM'). Default DRY-RUN.
# Only fills BLANK-venue SOs, only when the showroom has a venue_name set (no
# guessing). apply=1 to write; only_wh=<code> to pick one showroom if >1.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which DB"
        required: true
        default: "staging"
        type: choice
        options: [staging, prod]
      apply:
        description: "1 to write, else DRY-RUN"
        required: false
        default: "0"
        type: string
      only_wh:
        description: "Showroom warehouse code to limit to (blank = the single showroom)."
        required: false
        default: ""
        type: string
      set_venue:
        description: "If the showroom has no venue name, set it to this label (owner names the venue)."
        required: false
        default: ""
        type: string

concurrency:
  group: backfill-2990-so-venue-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  run-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci
      - run: node scripts/backfill-2990-so-venue.mjs
        env:
          APPLY: ${{ inputs.apply }}
          ONLY_WH: ${{ inputs.only_wh }}
          SET_VENUE: ${{ inputs.set_venue }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

  run-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci
      - run: node scripts/backfill-2990-so-venue.mjs
        env:
          APPLY: ${{ inputs.apply }}
          ONLY_WH: ${{ inputs.only_wh }}
          SET_VENUE: ${{ inputs.set_venue }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
