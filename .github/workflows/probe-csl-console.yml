name: Probe CSL vs Console (read-only)

# Manual, read-only. Answers whether Houzs's `CSL` and 2990's `Console` are one
# product under two names or two live products, with real row counts, BEFORE
# any rename cascade rewrites a historical document.
# target=staging (DEFAULT) runs against STAGING_DATABASE_URL (Staging env);
# target=prod must be picked explicitly. No writes either way — the script pins
# the session to default_transaction_read_only.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which DB to probe"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod
      from_code:
        description: "Code to probe as the rename SOURCE"
        required: false
        default: "CSL"
        type: string
      to_code:
        description: "Code to probe as the rename TARGET"
        required: false
        default: "Console"
        type: string

jobs:
  probe-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/probe-csl-console.mjs
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          PROBE_FROM: ${{ inputs.from_code }}
          PROBE_TO: ${{ inputs.to_code }}

  probe-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/probe-csl-console.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PROBE_FROM: ${{ inputs.from_code }}
          PROBE_TO: ${{ inputs.to_code }}
