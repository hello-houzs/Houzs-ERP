name: Amendment apply check (read-only)

# Answers "the amendment says approved — did the SO actually change?" without
# anyone opening a SQL console. Same pattern as soak-gate-check.yml: Actions
# already holds secrets.DATABASE_URL, so the SELECTs run here and no human
# handles the credential.
on:
  workflow_dispatch:
    inputs:
      so_doc_no:
        description: "Sales Order doc_no to inspect (e.g. SO-2607-015)"
        required: true
        type: string

# Deliberately NOT in the deploy concurrency group: this touches nothing and
# must never queue behind (or displace) a release.
concurrency:
  group: check-amendment-apply
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    environment: Production
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: node scripts/check-amendment-apply.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SO_DOC_NO: ${{ inputs.so_doc_no }}
          # GitHub-hosted runners have no IPv6 egress; see deploy-staging.yml.
          NODE_OPTIONS: --dns-result-order=ipv4first
