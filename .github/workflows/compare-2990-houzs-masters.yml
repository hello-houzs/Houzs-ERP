name: Compare 2990 vs HOUZS masters (SO Maintenance)

# Read-only diff of the SO Maintenance masters (countries, warehouses,
# state→warehouse, state→delivery-region) between HOUZS and 2990.
# Owner 2026-07-22 audit — the two companies should mostly share and
# where they don't, we want a diff list. Zero writes.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Destination DB"
        required: true
        default: "prod"
        type: choice
        options:
          - staging
          - prod

jobs:
  compare-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/compare-2990-houzs-masters.mjs
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

  compare-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/compare-2990-houzs-masters.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
