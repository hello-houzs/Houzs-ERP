name: Staging E2E (smoke)

# Post-deploy end-to-end proofs against the STAGING stack. Encodes the lesson
# "deploy green + 200/401 = shipped, NOT working": every staging deploy is
# followed by three real browser proofs (login, SO list, company isolation).
#
# Deliberately NOT wired to `pull_request` and NOT a required check. An active
# merge train gates on "zero failed checks", so a flaky external-environment
# E2E must never sit on the critical path. Triggers instead are:
#   - workflow_run     -> runs automatically after "Deploy (Staging)" succeeds
#   - workflow_dispatch-> an operator can run it on demand from the Actions tab
#   - schedule         -> a nightly proof that staging still actually works
on:
  workflow_run:
    workflows: ["Deploy (Staging)"]
    types: [completed]
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *" # 02:00 MYT nightly (UTC+8)

# One staging E2E run at a time — the specs share a single staging tenant and
# the isolation spec mutates the active-company key.
concurrency:
  group: staging-e2e
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    # For a workflow_run trigger, only proceed when the deploy it followed
    # actually succeeded (no point smoke-testing a half-deployed staging).
    # workflow_dispatch and schedule have no upstream run and always proceed.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    # A real assertion failure MUST surface red. The workflow stays non-required
    # (not on pull_request, not in branch protection), so red informs without
    # blocking the merge train.
    continue-on-error: false
    defaults:
      run:
        working-directory: frontend/e2e
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/e2e/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
        env:
          CI: "true"
          # Optional overrides. Absent -> the suite uses the in-repo public
          # staging-seed account (hello@houzscentury.com); the auth-dependent
          # specs skip gracefully if these AND the fallback resolve empty. Set
          # these repo secrets to point the suite at a different staging account.
          STAGING_E2E_EMAIL: ${{ secrets.STAGING_E2E_EMAIL }}
          STAGING_E2E_PASSWORD: ${{ secrets.STAGING_E2E_PASSWORD }}
          # Targets. The config bakes in the same defaults; these repo VARIABLES
          # let an operator re-point the suite (e.g. at a preview) without a code
          # change.
          STAGING_BASE_URL: ${{ vars.STAGING_E2E_BASE_URL || 'https://houzs-erp-staging.pages.dev' }}
          STAGING_API_URL: ${{ vars.STAGING_E2E_API_URL || 'https://autocount-sync-api-staging.houzs-erp.workers.dev' }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/e2e/playwright-report/
          retention-days: 14
