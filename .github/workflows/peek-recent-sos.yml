name: Peek recent SOs

# READ-ONLY one-shot probe: list the most recent scm.mfg_sales_orders rows
# and per-day counts. Confirms whether "0 SOs since flip" is real or a
# table-choice mistake.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Destination DB"
        required: true
        default: "prod"
        type: choice
        options:
          - staging
          - prod

jobs:
  peek-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/peek-recent-sos.mjs
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

  peek-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/peek-recent-sos.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
