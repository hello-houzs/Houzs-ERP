name: Diag branding match (read-only)

# Manual, read-only. Shows the gap between free-text branding on 2990's
# SKUs / models / SO lines and the maintained project_brands dropdown, with
# a proposed canonical mapping — the review table the owner needs BEFORE we
# backfill. No writes.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which DB to inspect"
        required: true
        default: "prod"
        type: choice
        options:
          - staging
          - prod

concurrency:
  group: diag-branding-match-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  diag-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci
      - run: node scripts/diag-branding-match.mjs
        env: { DATABASE_URL: '${{ secrets.STAGING_DATABASE_URL }}' }

  diag-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci
      - run: node scripts/diag-branding-match.mjs
        env: { DATABASE_URL: '${{ secrets.DATABASE_URL }}' }
