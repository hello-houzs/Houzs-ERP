name: Check 2990 brands (read-only)

# Manual, read-only. Lists every project_brands row scoped to 2990 (co=2),
# confirms HOUZS's own brand table is untouched, and shows the DISTINCT
# branding values in use across 2990's SKUs / models / SO lines — so the
# owner can verify the 2026-07-23 seed (hydrate-2990-branding.yml) only
# added values from 2990's own data.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which DB to inspect"
        required: true
        default: "prod"
        type: choice
        options:
          - staging
          - prod

concurrency:
  group: check-2990-brands-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  check-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/check-2990-brands-list.mjs
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

  check-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/check-2990-brands-list.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
