name: Backfill 2990 SO branding from SKU

# Manual. Fills blank branding on company_2 (2990) SO LINES from the SKU
# (mfg_products.branding) so the SO list Branding pill shows. Default DRY-RUN;
# the dry-run also reports which SKUs still have NO branding (needs owner to set
# it in Product maintenance). apply=1 to write.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which DB"
        required: true
        default: "staging"
        type: choice
        options: [staging, prod]
      apply:
        description: "1 to write, else DRY-RUN"
        required: false
        default: "0"
        type: string

concurrency:
  group: backfill-2990-so-branding-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  run-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci
      - run: node scripts/backfill-2990-so-branding-from-sku.mjs
        env:
          APPLY: ${{ inputs.apply }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

  run-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci
      - run: node scripts/backfill-2990-so-branding-from-sku.mjs
        env:
          APPLY: ${{ inputs.apply }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
