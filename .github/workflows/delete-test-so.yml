name: Delete test SO

# Deletes a single (test) Sales Order + all its child rows.
# Refuses if the SO has downstream docs, multiple payments, or is past
# the CONFIRMED lane. See backend/scripts/delete-test-so.mjs for the
# full safety contract.
on:
  workflow_dispatch:
    inputs:
      doc_no:
        description: "The SO doc_no to delete (e.g. 2990-SO-2607-019)"
        required: true
      apply:
        description: "Set to 1 to DELETE (else dry-run report only)"
        required: false
        default: "0"
      target:
        description: "Destination DB"
        required: true
        default: "prod"
        type: choice
        options:
          - staging
          - prod

jobs:
  delete-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/delete-test-so.mjs
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          DOC_NO: ${{ github.event.inputs.doc_no }}
          APPLY: ${{ github.event.inputs.apply }}

  delete-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/delete-test-so.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DOC_NO: ${{ github.event.inputs.doc_no }}
          APPLY: ${{ github.event.inputs.apply }}
