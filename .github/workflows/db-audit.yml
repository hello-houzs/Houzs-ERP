name: DB view audit (read-only)

# Manual, read-only. Lists scm/public VIEWs via the prod DATABASE_URL secret so
# the Phase 0f multi-company migration can recreate any scoped view. No writes.
on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/audit-views.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
