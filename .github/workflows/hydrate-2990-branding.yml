name: Hydrate 2990 branding (seed + backfill)

# Manual, one-shot. Two scripts glued together in one workflow so the fix
# for the 2026-07-23 "SO branding column all empty on 2990" bug runs as one
# atomic action:
#   1) seed  — bootstrap project_brands for company_id=2 from DISTINCT
#              branding on 2990's own SKUs (Product Maintenance dropdown
#              becomes maintainable instead of falling back to distinct).
#   2) fill  — backfill mfg_sales_order_items.branding from mfg_products
#              for existing NULL/blank lines (immediate visual fix on SO
#              list + PDF).
# Default is DRY-RUN. apply=1 to actually write. target=staging|prod
# (staging behind the Staging environment approval).
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which DB to hydrate"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod
      apply:
        description: "1 to write, else DRY-RUN"
        required: false
        default: "0"
        type: string

# Own concurrency group — never queues behind or displaces a deploy.
concurrency:
  group: hydrate-2990-branding-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  hydrate-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - name: Seed 2990 project_brands
        run: node scripts/seed-2990-project-brands.mjs
        env:
          APPLY: ${{ inputs.apply }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      - name: Backfill SO line branding
        run: node scripts/backfill-so-line-branding.mjs
        env:
          APPLY: ${{ inputs.apply }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

  hydrate-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - name: Seed 2990 project_brands
        run: node scripts/seed-2990-project-brands.mjs
        env:
          APPLY: ${{ inputs.apply }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Backfill SO line branding
        run: node scripts/backfill-so-line-branding.mjs
        env:
          APPLY: ${{ inputs.apply }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
