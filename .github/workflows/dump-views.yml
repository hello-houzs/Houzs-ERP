name: Dump SCM report views (read-only)

# Manual, read-only. Dumps pg_get_viewdef for the 8 SCM report views that
# migration 0084 missed, so they can be rebuilt to expose company_id.
# Defaults to STAGING (Staging env / STAGING_DATABASE_URL). No writes.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which DB to dump view defs from"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod

jobs:
  dump-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/dump-views.mjs
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

  dump-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/dump-views.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
