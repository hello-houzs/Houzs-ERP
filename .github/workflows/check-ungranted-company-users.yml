name: Ungranted company users (read-only)

# Answers "is it safe to flip companyContext to fail-closed?" without anyone
# opening a SQL console. Reports how many active users have ZERO user_companies
# grants — those accounts currently see ALL brands via the fail-open (audit M2).
#
# The count lives only in production, and the repo's standing rule forbids
# pasting a DSN in front of a human for a SELECT. Actions already holds
# secrets.DATABASE_URL for the deploy, so the check runs here.
#
# Manual trigger only — a question, not a gate; never on a schedule (a scheduled
# production read is CI noise nobody reads).
on:
  workflow_dispatch:

# Deliberately NOT in the deploy concurrency group: this touches nothing and
# must never queue behind (or displace) a release.
concurrency:
  group: check-ungranted-company-users
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    # Same environment as the deploy, because that is where DATABASE_URL lives.
    environment: Production
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: node scripts/check-ungranted-company-users.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # GitHub-hosted runners have no IPv6 egress; see deploy-staging.yml
          # for the full Happy-Eyeballs reasoning. Harmless on an IPv4-only host.
          NODE_OPTIONS: --dns-result-order=ipv4first
