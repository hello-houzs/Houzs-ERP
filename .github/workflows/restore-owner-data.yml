name: Restore owner amendment data (one-off)

# Manually-triggered, one-off restore of the owner's pre-cutover May/June
# amendment data (branch feat/checklist-amendments -> RESTORE-DATA/) into prod
# Supabase. The cutover rebuilt prod from main without this data; this puts it
# back, selectively + additively.
#
# Safety:
#   - ALWAYS pg_dumps the four affected tables to an artifact BEFORE any write.
#     If the backup step fails, the job stops and nothing is imported.
#   - Dry run by default (apply input = "no"): reports matched/unmatched, writes
#     nothing. Set apply = "yes" to actually write (in a single transaction).
#   - The script only touches projects / project_finance / lorries / users.
#     Never Service/ASSR, never roles/page-access, never deletes, never creates a
#     project or user. See backend/scripts/restore-owner-data.mjs.
#   - The data files (which contain staff PII) are read from the old branch at
#     run time and are NOT committed to main.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Write to prod? "no" = dry run (default), "yes" = apply'
        required: true
        default: "no"
        type: choice
        options:
          - "no"
          - "yes"

concurrency:
  group: restore-owner-data
  cancel-in-progress: false

jobs:
  restore:
    runs-on: ubuntu-latest
    environment: Production
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci

      # Pull the owner's data files from the old branch into a temp dir (keeps
      # the staff PII out of main's tree). Excludes roles / role_page_access.
      - name: Stage RESTORE-DATA from feat/checklist-amendments
        run: |
          set -euo pipefail
          mkdir -p /tmp/restore
          git fetch --no-tags origin feat/checklist-amendments
          for f in projects-may-june-values.json lorries.json fleet-staff.json; do
            git show origin/feat/checklist-amendments:RESTORE-DATA/$f > /tmp/restore/$f
          done
          echo "Staged:"; ls -l /tmp/restore

      # BACKUP FIRST — data-only dump of exactly the tables we may write. If this
      # fails (non-zero exit), the job stops here and nothing is imported.
      - name: Backup affected tables (pg_dump)
        run: |
          set -euo pipefail
          # Supabase runs PG 17; Ubuntu's default pg_dump (16) refuses to dump a
          # newer server. Install the matching client from the official PGDG repo.
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          PG_DUMP=/usr/lib/postgresql/17/bin/pg_dump
          "$PG_DUMP" --version
          STAMP=$(date -u +%Y%m%dT%H%M%SZ)
          mkdir -p /tmp/backup
          "$PG_DUMP" "$DATABASE_URL" --data-only --no-owner --no-privileges \
            -t public.projects -t public.project_finance \
            -t public.lorries -t public.users \
            -f "/tmp/backup/houzs-pre-restore-$STAMP.sql"
          echo "Backup size:"; ls -lh /tmp/backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: houzs-pre-restore-backup
          path: /tmp/backup/*.sql
          retention-days: 90
          if-no-files-found: error

      # Dry run always — visible diff of what would change.
      - name: Restore (dry run)
        run: node scripts/restore-owner-data.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESTORE_DIR: /tmp/restore

      # Apply only when explicitly requested.
      - name: Restore (APPLY)
        if: ${{ inputs.apply == 'yes' }}
        run: node scripts/restore-owner-data.mjs --apply
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESTORE_DIR: /tmp/restore
