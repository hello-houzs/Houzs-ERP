name: Verify SO CAS cutover (read-only)

# Post-deploy check for #927. Read-only: two SELECTs, no writes.
# Manual only, own concurrency group — a diagnostic must never queue behind or
# displace a release.
on:
  workflow_dispatch:

concurrency:
  group: verify-so-cas
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    environment: Production
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: node scripts/verify-so-cas.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_OPTIONS: --dns-result-order=ipv4first
