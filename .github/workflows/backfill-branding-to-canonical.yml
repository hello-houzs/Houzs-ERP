name: Backfill branding to canonical (guarded)

# Manual. Rewrites free-text branding on 2990's SKUs / models / SO lines to
# the maintained project_brands dropdown value, using the SAME category-aware
# mapping diag-branding-match.mjs prints. Default DRY-RUN. apply=1 to write.
#
# ORDER OF OPERATIONS (owner):
#   1. Run "Diag branding match" and review the proposed mapping.
#   2. Delete duplicate brands in Project Maintenance -> Brands so the
#      canonical (ACTIVE) set is final.
#   3. Run this with apply=0 (dry-run) — confirm the rewrites read right.
#   4. Run this with apply=1.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which DB"
        required: true
        default: "staging"
        type: choice
        options: [staging, prod]
      apply:
        description: "1 to write, else DRY-RUN"
        required: false
        default: "0"
        type: string

concurrency:
  group: backfill-branding-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  run-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci
      - run: node scripts/backfill-branding-to-canonical.mjs
        env:
          APPLY: ${{ inputs.apply }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

  run-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci
      - run: node scripts/backfill-branding-to-canonical.mjs
        env:
          APPLY: ${{ inputs.apply }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
