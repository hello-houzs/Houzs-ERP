name: Check maintenance-tables scoping (read-only)

# Manual, read-only. Answers: are these tables truly scoped by company_id,
# or shared? Confirms whether deep-parity's MISSING count against them is a
# real gap or a diag artifact (owner 2026-07-23 challenge).
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which DB to inspect"
        required: true
        default: "prod"
        type: choice
        options:
          - staging
          - prod

concurrency:
  group: check-maintenance-tables-scope-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  check-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci
      - run: node scripts/check-maintenance-tables-scope.mjs
        env: { DATABASE_URL: '${{ secrets.STAGING_DATABASE_URL }}' }

  check-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci
      - run: node scripts/check-maintenance-tables-scope.mjs
        env: { DATABASE_URL: '${{ secrets.DATABASE_URL }}' }
