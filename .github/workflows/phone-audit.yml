name: Phone country-code audit (read-only)

# Counts stored contact numbers that have no country code, so the size of the
# gap is a number instead of a guess. Changes nothing — fixing the rows is a
# migration, and a migration should be written against a known count.
#
# Manual trigger only, and deliberately NOT in the deploy concurrency group: a
# diagnostic must never queue behind, or displace, a release.
on:
  workflow_dispatch:

concurrency:
  group: phone-audit
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    # Same environment as the deploy, because that is where DATABASE_URL lives.
    environment: Production
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: node scripts/audit-phone-country-codes.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_OPTIONS: --dns-result-order=ipv4first
