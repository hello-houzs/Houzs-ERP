name: Migrate 2990 staff into Houzs users (one-off)

# Brings 2990's staff into Houzs as public.users, grants companies, and relinks
# each person's EXISTING 2990 scm.staff row to the new user.
# Script: backend/scripts/migrate-2990-staff.mjs (read its header for the
# double-staff-row trap and why it relinks rather than letting 0066's trigger
# mint a second row).
#
# Safety:
#   - target=staging is the DEFAULT and writes to STAGING_DATABASE_URL (a
#     Staging environment secret -- it cannot reach prod). target=prod must be
#     chosen explicitly, and only after the staging run is verified (owner's
#     staging-first rule).
#   - ALWAYS pg_dumps the three affected tables (public.users,
#     public.user_companies, scm.staff) to a 90-day artifact BEFORE any write.
#     If the backup step fails, the job stops and nothing is written.
#   - Dry run by default (apply = "no"): reports the full plan, writes nothing.
#   - The APPLY run is a single transaction, and refuses to delete any scm.staff
#     row that is still referenced.
#
# The generated passwords for the five @2990s.local POS identities are printed
# in the APPLY run's log ONCE. Copy them from there and distribute; they are not
# stored anywhere else and are never committed.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Destination DB"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod
      apply:
        description: 'Write? "no" = dry run (default), "yes" = apply'
        required: true
        default: "no"
        type: choice
        options:
          - "no"
          - "yes"
      fallback_role_name:
        description: "Optional: role name for anyone with no active peer at their position (e.g. Marketing, who has no position)"
        required: false
        default: ""

concurrency:
  group: migrate-2990-staff
  cancel-in-progress: false

jobs:
  staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci

      # BACKUP FIRST. Non-zero exit here stops the job before any write.
      - name: Backup affected tables (pg_dump)
        run: |
          set -euo pipefail
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          PG_DUMP=/usr/lib/postgresql/17/bin/pg_dump
          "$PG_DUMP" --version
          STAMP=$(date -u +%Y%m%dT%H%M%SZ)
          mkdir -p /tmp/backup
          "$PG_DUMP" "$DATABASE_URL" --data-only --no-owner --no-privileges \
            -t public.users -t public.user_companies -t scm.staff \
            -f "/tmp/backup/staging-pre-2990-staff-$STAMP.sql"
          echo "Backup size:"; ls -lh /tmp/backup
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-pre-2990-staff-backup
          path: /tmp/backup/*.sql
          retention-days: 90
          if-no-files-found: error

      - name: Migrate staff (dry run)
        run: node scripts/migrate-2990-staff.mjs
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          FALLBACK_ROLE_NAME: ${{ inputs.fallback_role_name }}

      - name: Migrate staff (APPLY)
        if: ${{ inputs.apply == 'yes' }}
        run: node scripts/migrate-2990-staff.mjs
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          FALLBACK_ROLE_NAME: ${{ inputs.fallback_role_name }}
          APPLY: "1"

  prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    environment: Production
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci

      # BACKUP FIRST. Non-zero exit here stops the job before any write.
      - name: Backup affected tables (pg_dump)
        run: |
          set -euo pipefail
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          PG_DUMP=/usr/lib/postgresql/17/bin/pg_dump
          "$PG_DUMP" --version
          STAMP=$(date -u +%Y%m%dT%H%M%SZ)
          mkdir -p /tmp/backup
          "$PG_DUMP" "$DATABASE_URL" --data-only --no-owner --no-privileges \
            -t public.users -t public.user_companies -t scm.staff \
            -f "/tmp/backup/houzs-pre-2990-staff-$STAMP.sql"
          echo "Backup size:"; ls -lh /tmp/backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: houzs-pre-2990-staff-backup
          path: /tmp/backup/*.sql
          retention-days: 90
          if-no-files-found: error

      - name: Migrate staff (dry run)
        run: node scripts/migrate-2990-staff.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FALLBACK_ROLE_NAME: ${{ inputs.fallback_role_name }}

      - name: Migrate staff (APPLY)
        if: ${{ inputs.apply == 'yes' }}
        run: node scripts/migrate-2990-staff.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FALLBACK_ROLE_NAME: ${{ inputs.fallback_role_name }}
          APPLY: "1"
