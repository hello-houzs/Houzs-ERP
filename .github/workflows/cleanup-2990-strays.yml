name: Cleanup 2990 import strays

# One-shot cleanup for the 2026-07-21 stray-row incident (BUG-HISTORY.md).
# Dry-run (apply=0) prints the keep/drop split + stray list and writes nothing.
on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Set to 1 to DELETE (else dry-run report only)"
        required: false
        default: "0"
      target:
        description: "Destination DB"
        required: true
        default: "prod"
        type: choice
        options:
          - staging
          - prod

jobs:
  cleanup-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/cleanup-2990-import-strays.mjs
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          APPLY: ${{ github.event.inputs.apply }}

  cleanup-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/cleanup-2990-import-strays.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APPLY: ${{ github.event.inputs.apply }}
