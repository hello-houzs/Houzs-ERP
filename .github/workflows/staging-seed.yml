name: Staging Seed (one-off)
# Bootstraps the restored staging DB: owner login + system showroom.
# Runs in Actions because local machines cannot auth against the pooler.
on: workflow_dispatch
jobs:
  seed:
    runs-on: ubuntu-latest
    environment: Staging
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: npm, cache-dependency-path: backend/package-lock.json }
      - run: npm ci
      - run: node scripts/staging-seed-account.mjs
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          NODE_OPTIONS: --dns-result-order=ipv4first
