name: Uncosted COGS check (read-only)

# Sizes the permanently-uncosted-COGS exposure the FIFO audit found (owner ask
# 2026-07-24: "some accessories were already SHIPPED but the DO shows NO cost —
# RM0"). The soft "ship anyway" oversell path ships short units at ZERO cost, to
# be retro-costed later by fn_reconcile_uncosted_out (migration 0154) — but that
# reconcile is only invoked from the GRN post handler. When the replenishing
# stock arrives via a NON-GRN path (transfer / stock-take / adjustment /
# consignment-receive / return) the RM0 OUT is never retro-costed, so COGS stays
# understated permanently. The script runs two SELECTs: (a) uncosted/RM0 OUT
# movements on non-cancelled DOs, and (b) which of those have open cover lots NOW
# (the true permanent-miss set) with an estimated understated-COGS figure.
#
# The answer lives only in production, so this runs here rather than putting the
# production DSN in front of a human for a SELECT (repo rule: build the check,
# never ask the owner to run a query). Strictly read-only — SELECT only, no
# writes, NO change to any costing logic. See backend/scripts/check-uncosted-cogs.mjs.
#
# Manual trigger only — it is a question, not a gate, and a production DB read
# must never become routine CI noise.
on:
  workflow_dispatch:

# Own concurrency group — touches nothing, must never queue behind or displace a
# release (and must not share the deploy's group).
concurrency:
  group: uncosted-cogs-check
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    # Same environment as the deploy, because that is where DATABASE_URL lives.
    environment: Production
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: node scripts/check-uncosted-cogs.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # GitHub-hosted runners have no IPv6 egress; match the deploy jobs and
          # the sibling read-only checks (soak-gate-check.yml, diag-do-payments.yml).
          NODE_OPTIONS: --dns-result-order=ipv4first
