name: POS director-access diag (read-only)

# Answers "do we have an Assistant Director position, and do our Sales Directors
# actually resolve to a FULL POS role?" WITH EVIDENCE, without anyone opening a
# SQL console. Reports public.positions + user counts, the scm.staff.role
# distribution the POS gates on, and the director-position -> staff.role -> POS
# mode mapping. Strictly read-only (SELECT only). Changes NO permission.
#
# Manual trigger only — a question, not a gate, and a production DB read must
# never become routine CI noise. Actions already holds secrets.DATABASE_URL for
# the deploy, so nobody handles the credential.
on:
  workflow_dispatch:

# Own concurrency group — touches nothing, must never queue behind or displace a
# release.
concurrency:
  group: diag-pos-role-access
  cancel-in-progress: true

jobs:
  diag:
    runs-on: ubuntu-latest
    environment: Production
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: node scripts/diag-pos-role-access.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # GitHub-hosted runners have no IPv6 egress; match the deploy jobs.
          NODE_OPTIONS: --dns-result-order=ipv4first
