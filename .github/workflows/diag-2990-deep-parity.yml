name: Diag 2990 deep parity (field-level, read-only)

# Manual, read-only. For every table both 2990 source and Houzs dest share,
# compares row content column-by-column and flags any dest row that carries
# a STALE COPY (matched by id or natural key but content diverges). Extends
# diag-2990-gaps.yml from presence to freshness. See
# backend/scripts/diag-2990-deep-parity.mjs for the full doc block.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which DB to inspect"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod

# Own concurrency group — a diagnostic must never queue behind, or displace,
# a deploy (CLAUDE.md, "Never ask the owner to run a query" section).
concurrency:
  group: diag-2990-deep-parity-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  diag-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/diag-2990-deep-parity.mjs
        env:
          SOURCE_SUPABASE_URL: ${{ secrets.SOURCE_SUPABASE_URL }}
          SOURCE_SERVICE_ROLE_KEY: ${{ secrets.SOURCE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

  diag-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/diag-2990-deep-parity.mjs
        env:
          SOURCE_SUPABASE_URL: ${{ secrets.SOURCE_SUPABASE_URL }}
          SOURCE_SERVICE_ROLE_KEY: ${{ secrets.SOURCE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
