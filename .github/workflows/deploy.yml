name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backend:
    runs-on: ubuntu-latest
    environment: Production 
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # Apply any pending Postgres migrations BEFORE deploying the new Worker so
      # the schema is ready when the new code goes live. Migrations are additive
      # + idempotent by convention, so running on every deploy is safe and a
      # no-op when there's nothing pending. DATABASE_URL is a repo secret (prod
      # Supabase direct connection string). This removes the old manual
      # `node scripts/pg-migrate.mjs` step — migrations now ship with the deploy.
      - run: node scripts/pg-migrate.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          command: deploy
      # Post-deploy smoke check: confirm the new Worker is serving AND its
      # DB path (Hyperdrive -> Supabase) is alive before calling the deploy
      # good. Detects the 2026-06-13 failure mode (Worker up, DB hung). Set
      # repo var SMOKE_URL to override the default workers.dev origin. This
      # DETECTS a bad deploy (red job + notification); rollback is manual
      # (`wrangler rollback`).
      - run: node scripts/smoke-check.mjs "${{ vars.SMOKE_URL || 'https://autocount-sync-api.houzs-erp.workers.dev' }}"
      # D1 migrations are NOT auto-applied. Run
      # `npm --prefix backend run db:migrate` locally before merging
      # the migration's PR.

  frontend:
    runs-on: ubuntu-latest
    environment: Production
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
        env:
          # Vite inlines this into the public JS bundle at build time.
          # Stored as a GitHub repository VARIABLE (not secret) — it's
          # baked into client-side JS anyway. See plan file for
          # rationale.
          VITE_API_URL: ${{ vars.VITE_API_URL }}
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: pages deploy ./dist --project-name=houzs-erp --commit-dirty=true
