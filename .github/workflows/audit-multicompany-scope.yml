name: Audit multi-company scope (read-only)

# Manual, read-only SCHEMA audit. Lists every scm table as SCOPED-OK /
# LANDMINE (global unique on a per-company table) / NO-COMPANY, so the owner
# can see what must be fixed before opening company 3/4/5. No data, no writes.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which DB"
        required: true
        default: "prod"
        type: choice
        options: [staging, prod]

concurrency:
  group: audit-multicompany-scope-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  audit-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci
      - run: node scripts/audit-multicompany-scope.mjs
        env: { DATABASE_URL: '${{ secrets.DATABASE_URL }}' }

  audit-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci
      - run: node scripts/audit-multicompany-scope.mjs
        env: { DATABASE_URL: '${{ secrets.STAGING_DATABASE_URL }}' }
