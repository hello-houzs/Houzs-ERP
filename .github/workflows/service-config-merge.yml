name: Service config unify (2990 -> HOUZS shared)

# Unify service/maintenance config into ONE shared set (owner 2026-07-13).
# audit (default) = READ-ONLY compare HOUZS vs 2990 config. apply=1 deletes only
# 2990 duplicate rows whose key also exists under HOUZS. 2990-only keys are never
# touched. target=staging (default) or prod (explicit).
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which DB"
        required: true
        default: "staging"
        type: choice
        options: [staging, prod]
      apply:
        description: "1 = delete 2990 duplicate config rows; 0 = audit only"
        required: true
        default: "0"
        type: choice
        options: ["0", "1"]

jobs:
  run-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci
      - run: node scripts/service-config-merge.mjs
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          APPLY: ${{ inputs.apply }}

  run-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci
      - run: node scripts/service-config-merge.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APPLY: ${{ inputs.apply }}
