name: Check 2990 GL collision (read-only)

# Manual, read-only. Decides whether 2990's chart of accounts can be plain-
# imported (no code clash with dest) or needs a per-company constraint change
# first. No writes.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which DB"
        required: true
        default: "prod"
        type: choice
        options: [staging, prod]

concurrency:
  group: check-2990-gl-collision-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  check-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci
      - run: node scripts/check-2990-gl-collision.mjs
        env:
          SOURCE_SUPABASE_URL: ${{ secrets.SOURCE_SUPABASE_URL }}
          SOURCE_SERVICE_ROLE_KEY: ${{ secrets.SOURCE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  check-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci
      - run: node scripts/check-2990-gl-collision.mjs
        env:
          SOURCE_SUPABASE_URL: ${{ secrets.SOURCE_SUPABASE_URL }}
          SOURCE_SERVICE_ROLE_KEY: ${{ secrets.SOURCE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
