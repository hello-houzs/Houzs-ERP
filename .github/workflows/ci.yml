name: CI

# Run on every branch push and every PR, not just main. The old config
# only fired on main, so a broken typecheck/test could sit on a feature
# branch undetected until it was merged. Branch CI catches it at push.
on:
  pull_request:
  push:
    branches-ignore:
      - main # main is covered by deploy.yml (which also typechecks + tests)

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Static backend checks, split out of the test job so a type error is
  # reported in ~1 minute instead of after the whole suite. Measured on the
  # old single `backend` job (run 29839727146): npm ci 26s, audit:routes 1s,
  # typecheck 26s, `npm test` 334s. Typecheck was queued BEHIND those 334s
  # for no reason — it does not depend on them.
  backend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run audit:routes
      - run: npm run typecheck

  # The backend suite is 112 files and it runs them SERIALLY inside a single
  # workerd worker (`singleWorker: true` in backend/vitest.config.ts). That is
  # deliberate and load-bearing: at full concurrency this pool collapses with
  # 50-65 of 66 files "failing", ZERO AssertionErrors, and 100+ `[vitest-worker]:
  # Timeout calling "onTaskUpdate"` — the worker cannot reach the main thread.
  # See the long comment in vitest.config.ts. Do NOT speed this up by raising
  # in-process parallelism; that is the exact thing that breaks it.
  #
  # So we shard across SEPARATE RUNNERS instead. `--shard=i/n` slices the
  # collected spec list before it is handed to the pool (vitest 3.0.9,
  # sequencer.shard()), so each runner still runs its subset serially in one
  # worker at the same concurrency it uses today. Nothing about the pool config
  # changes; there are just fewer files per pool.
  #
  # Why 4: per-shard cost is ~28s fixed (checkout + setup-node + cached npm ci)
  # plus 334s/N of tests. N=2 -> 3m17s, N=3 -> 2m21s, N=4 -> 1m54s,
  # N=6 -> 1m26s. Going 3->4 buys 27s for one more runner; 4->6 buys only 28s
  # more for two more runners, by which point fixed overhead is a third of the
  # job. 4 is the knee, and 112/4 = 28 files per shard exactly.
  #
  # Sharding is by file-path hash, not by measured duration, so the slowest
  # shard runs somewhat above the 84s mean. Budget ~2-2.5min wall.
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      # Let every shard finish. If the pool-collapse signature above ever
      # returns it shows up as ALL FOUR shards red with no AssertionError,
      # which is instantly distinguishable from one shard with a real failing
      # test. fail-fast would hide that. It does NOT weaken the gate — the
      # `backend` roll-up below still fails if any shard fails.
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      # job-total is the matrix size, so the shard count follows the matrix
      # automatically and index/count can never drift apart.
      - run: npm test -- --shard=${{ matrix.shard }}/${{ strategy.job-total }}

  # Roll-up so the backend gate keeps ONE stable check name. Before this PR the
  # required-looking check was `backend`; after the split the real work lives in
  # `backend-typecheck` and `backend-tests (1..4)`. This job keeps `backend`
  # green/red exactly as before so nothing that watches that name — a reviewer's
  # eye today, branch protection if it is ever turned on — has to be rewired.
  #
  # `if: always()` is required: without it a failed dependency SKIPS this job,
  # and a skipped check is not a failed check. The explicit result assertions
  # below are what make the gate real. For a matrix dependency, `.result` is
  # 'success' only when every leg succeeded.
  backend:
    needs: [backend-typecheck, backend-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Assert all backend jobs succeeded
        run: |
          echo "backend-typecheck: ${{ needs.backend-typecheck.result }}"
          echo "backend-tests:     ${{ needs.backend-tests.result }}"
          [ "${{ needs.backend-typecheck.result }}" = "success" ] || exit 1
          [ "${{ needs.backend-tests.result }}" = "success" ] || exit 1

  scale-postgres-contract:
    # The full 100k evidence run is deliberately PR-only. GitHub emits both a
    # push and pull_request event for an open branch; running this job twice
    # would spend twice the time without adding an independent environment.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: houzs_scale_test
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d houzs_scale_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      PERF_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/houzs_scale_test
      PERF_LOCAL_ACK: I_UNDERSTAND_THIS_IS_A_DISPOSABLE_LOCAL_DATABASE
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Mark the ephemeral database as disposable
        run: >-
          node --input-type=module -e
          "import postgres from 'postgres';
          const sql = postgres(process.env.PERF_DATABASE_URL, { max: 1 });
          try { await sql.unsafe(\"COMMENT ON DATABASE houzs_scale_test IS 'HOUZS_DISPOSABLE_LOCAL_SCALE_V1'\"); }
          finally { await sql.end(); }"
      - name: Execute the full real-schema PostgreSQL scale fixture
        run: |
          mkdir -p artifacts
          npm run perf:scale -- --engine=pg --orders=100000 --lines=100000 --skus=10000 --users=10000 --runs=20 --json=artifacts/scale-pg-100k.json
      - name: Upload immutable scale evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scale-pg-100k-${{ github.sha }}
          path: backend/artifacts/scale-pg-100k.json
          if-no-files-found: error
          retention-days: 30

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
        with:
          # Needed to resolve the merge base for the bundle baseline below.
          # Without history `git merge-base` has nothing to work with and the
          # bundle gate silently degrades to absolute ceilings — which is the
          # exact behaviour that failed four innocent PRs in eight days.
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check:test-focus
      - run: npm run typecheck
      - run: npm test
      # Zero-dependency node:test checks for the two gate scripts' own logic.
      # Not part of `npm test` (vitest only collects src/**), so they are run
      # explicitly here — a checker nobody runs is not a checker.
      - run: node --test scripts/check-bundle-verdict.mjs
      - run: npm run build

      # Build the MERGE BASE and measure it, so the budget gate can report this
      # change's own growth instead of an absolute total that main can exhaust
      # on an unrelated PR's behalf.
      #
      # On a `pull_request` event GitHub builds the MERGE with main, so the PR
      # inherits whatever main's bundle currently is. Without this baseline the
      # gate fails whichever PR happens to run after main spends the budget —
      # on 2026-07-21 that was a DOCS-ONLY PR (#873, `docs/mockups/pdf/*`, zero
      # source files) failing by 0.1 KB. See frontend/scripts/lib/bundle-verdict.mjs.
      #
      # `merge-base HEAD origin/main` is right for both triggers: on the PR
      # merge ref it resolves to main's tip (the thing the merge added to), and
      # on a branch push it resolves to where the branch left main.
      #
      # continue-on-error: a baseline is an improvement to the report, never a
      # new way to fail. If this step cannot produce numbers the gate falls back
      # to absolute ceilings and SAYS SO in its output.
      - name: Measure the merge base (bundle baseline)
        id: bundle-baseline
        continue-on-error: true
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          BASE=$(git merge-base HEAD FETCH_HEAD)
          echo "merge base: $BASE"
          if [ "$BASE" = "$(git rev-parse HEAD)" ]; then
            echo "HEAD is the merge base; nothing to compare against."
            exit 0
          fi
          git worktree add /tmp/bundle-base "$BASE"
          cd /tmp/bundle-base/frontend
          if cmp -s package-lock.json "$GITHUB_WORKSPACE/frontend/package-lock.json"; then
            # Identical lockfile -> identical dependency tree. Reuse the install
            # instead of paying for a second `npm ci`.
            ln -s "$GITHUB_WORKSPACE/frontend/node_modules" node_modules
          else
            npm ci
          fi
          # `npx vite build` and not `npm run build`: the baseline only needs the
          # emitted bundle, and re-running `tsc -b` on main buys nothing here.
          npx vite build
          # Measured by THIS branch's script (the merge base's copy predates the
          # --json/--dist flags), so both sides are measured the same way.
          node "$GITHUB_WORKSPACE/frontend/scripts/check-bundle-size.mjs" \
            --dist /tmp/bundle-base/frontend/dist \
            --json /tmp/bundle-baseline.json

      # Fail the build if THIS CHANGE made the bundle materially heavier (see
      # the script for the rules + rationale). Cheap, and the thing that
      # actually keeps first paint fast.
      - run: node scripts/check-bundle-size.mjs --baseline /tmp/bundle-baseline.json
      # Exercise the emitted service worker, including stale-chunk and offline
      # shell behavior. This catches deploy-cache regressions without relying on
      # flaky wall-clock or an external environment.
      - run: npm run check:sw
      - run: npm run test:smoke-script

  e2e-contract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/e2e
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/e2e/package-lock.json
      - run: npm ci
      # The live staging suite remains post-deploy. PR CI still compiles and
      # discovers every spec so a broken smoke contract cannot merge silently.
      - run: npm run typecheck
      - run: npm run test:list
