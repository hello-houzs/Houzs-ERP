name: CI

# Run on every branch push and every PR, not just main. The old config
# only fired on main, so a broken typecheck/test could sit on a feature
# branch undetected until it was merged. Branch CI catches it at push.
on:
  pull_request:
  push:
    branches-ignore:
      - main # main is covered by deploy.yml (which also typechecks + tests)

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  backend-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: houzs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d houzs_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/houzs_test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run test:pg

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # Fail the build if the bundle blew past budget (see the script for
      # the budgets + rationale). Cheap, and the thing that actually keeps
      # first paint fast.
      - run: npm run check:bundle
