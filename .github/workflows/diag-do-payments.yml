name: DO payments diag (read-only)

# Forensics on the 13 source public.delivery_order_payments rows the 2990 -> Houzs
# migration did NOT carry across (owner ask 2026-07-24: "our payments are all on
# the SO — why are there DO-level payments, and why weren't they migrated?").
# Dumps the 13 rows (amount/method/date/DO/SO), classifies each as DUPLICATE of an
# existing SO payment vs ADDITIONAL money (balance/COD at delivery), and reports
# how Houzs models DO payments. Strictly read-only (SELECT only) — see the script
# header. NO backfill; this only tells us what the 13 are.
#
# Manual trigger only — it is a question, not a gate, and a production DB read must
# never become routine CI noise. Actions already holds the deploy + importer
# secrets, so nobody handles a credential.
on:
  workflow_dispatch:

# Own concurrency group — touches nothing, must never queue behind or displace a
# release (and must not share the deploy's group).
concurrency:
  group: diag-do-payments
  cancel-in-progress: true

jobs:
  diag:
    runs-on: ubuntu-latest
    # Same environment as the deploy + importer: that is where DATABASE_URL and
    # the 2990 SOURCE_* secrets live.
    environment: Production
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: node scripts/diag-do-payments.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SOURCE_SUPABASE_URL: ${{ secrets.SOURCE_SUPABASE_URL }}
          SOURCE_SERVICE_ROLE_KEY: ${{ secrets.SOURCE_SERVICE_ROLE_KEY }}
          # GitHub-hosted runners have no IPv6 egress; match the deploy jobs.
          NODE_OPTIONS: --dns-result-order=ipv4first
