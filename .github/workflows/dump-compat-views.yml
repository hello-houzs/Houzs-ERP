name: Dump public compat views (read-only)

# Manual, read-only. Dumps pg_get_viewdef + column types for public.trips and
# public.lorries — the two compatibility VIEWs that exist in prod but in no
# migration file (created out-of-band after 0055 dropped the old tables). The
# output feeds migration 0136, which captures them into the tree so a fresh
# rebuild gets them too. Defaults to STAGING. No writes.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which DB to dump view defs from"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod

jobs:
  dump-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/dump-compat-views.mjs
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

  dump-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/dump-compat-views.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
