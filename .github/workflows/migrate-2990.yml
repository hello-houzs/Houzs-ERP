name: Migrate 2990 data into Houzs (Phase 2)

# target=staging (DEFAULT) writes to STAGING_DATABASE_URL (Staging environment
# secret — cannot reach prod). target=prod must be picked explicitly and only
# after the staging run is verified complete (owner's staging-first rule).
on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Set to 1 to WRITE (else dry-run + reconcile only)"
        required: false
        default: "0"
      target:
        description: "Destination DB"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod

jobs:
  migrate-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/migrate-2990-into-houzs.mjs
        env:
          SOURCE_SUPABASE_URL: ${{ secrets.SOURCE_SUPABASE_URL }}
          SOURCE_SERVICE_ROLE_KEY: ${{ secrets.SOURCE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          APPLY: ${{ github.event.inputs.apply }}

  migrate-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/migrate-2990-into-houzs.mjs
        env:
          SOURCE_SUPABASE_URL: ${{ secrets.SOURCE_SUPABASE_URL }}
          SOURCE_SERVICE_ROLE_KEY: ${{ secrets.SOURCE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APPLY: ${{ github.event.inputs.apply }}
