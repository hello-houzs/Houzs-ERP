name: Migrate 2990 data into Houzs (Phase 2)
on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Set to 1 to WRITE (else dry-run + reconcile only)"
        required: false
        default: "0"
jobs:
  migrate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/migrate-2990-into-houzs.mjs
        env:
          SOURCE_DATABASE_URL: ${{ secrets.SOURCE_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APPLY: ${{ github.event.inputs.apply }}
