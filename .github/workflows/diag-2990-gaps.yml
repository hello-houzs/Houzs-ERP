name: Diag 2990 gaps (read-only detail)

# Manual, read-only. Lists the SPECIFIC rows that account for the
# COMPLETENESS_GAPS numbers surfaced by diag-2990.yml, with identifying
# fields (doc_no / code / name) and a COLLISION vs MISSING classifier.
# target=staging (default) runs against STAGING_DATABASE_URL; target=prod
# must be picked explicitly. No writes either way.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which DB to inspect"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod

# Own concurrency group — a diagnostic must never queue behind, or displace,
# a deploy (CLAUDE.md, "Never ask the owner to run a query" section).
concurrency:
  group: diag-2990-gaps-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  diag-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/diag-2990-gaps.mjs
        env:
          SOURCE_SUPABASE_URL: ${{ secrets.SOURCE_SUPABASE_URL }}
          SOURCE_SERVICE_ROLE_KEY: ${{ secrets.SOURCE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

  diag-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/diag-2990-gaps.mjs
        env:
          SOURCE_SUPABASE_URL: ${{ secrets.SOURCE_SUPABASE_URL }}
          SOURCE_SERVICE_ROLE_KEY: ${{ secrets.SOURCE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
