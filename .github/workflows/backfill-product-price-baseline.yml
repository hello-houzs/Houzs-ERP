name: Backfill product price baseline (effective-dating go-live)

# Manual, one-shot. Gives every existing product SELLING price a DATE in
# scm.mfg_product_price_history so the effective-dating system has a timeline the
# day it goes live. Reconstructs from scm.master_price_history where audit exists,
# else writes a single baseline = the current flat price. Idempotent + non-
# clobbering: a product that already has a timeline is skipped. Default DRY-RUN;
# apply=1 to write. Run this AFTER the Pricing "Option B" write/read PR merges.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Destination DB"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod
      apply:
        description: "1 to write, else DRY-RUN"
        required: false
        default: "0"
        type: string

# Own concurrency group — never queues behind or displaces a deploy.
concurrency:
  group: backfill-product-price-baseline-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  backfill-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/backfill-product-price-baseline.mjs
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          APPLY: ${{ inputs.apply }}

  backfill-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/backfill-product-price-baseline.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APPLY: ${{ inputs.apply }}
