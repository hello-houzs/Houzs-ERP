name: Sample stored phones (read-only)
on: { workflow_dispatch: }
concurrency: { group: sample-phones, cancel-in-progress: true }
jobs:
  s:
    runs-on: ubuntu-latest
    environment: Production
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: npm, cache-dependency-path: backend/package-lock.json }
      - run: npm ci
      - run: node scripts/sample-phones.mjs
        env: { DATABASE_URL: "${{ secrets.DATABASE_URL }}", NODE_OPTIONS: --dns-result-order=ipv4first }
