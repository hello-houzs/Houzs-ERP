name: Verify cutover audit (A1..A3)

# One-shot READ-ONLY audit for the 2026-07-21 cutover:
#   A1 — cross-company customer binding (mig 0164 backfill window)
#   A2 — product_fabrics dangling probe (psv-class check)
#   A3 — mig 0091 default-company bleed probe
# The script has ZERO writes. Safe to run any time.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Destination DB"
        required: true
        default: "prod"
        type: choice
        options:
          - staging
          - prod

jobs:
  audit-staging:
    if: ${{ inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: Staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/verify-cutover-audit.mjs
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

  audit-prod:
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/verify-cutover-audit.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
