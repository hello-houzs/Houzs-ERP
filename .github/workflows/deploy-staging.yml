name: Deploy (Staging)

# ── Trigger ─────────────────────────────────────────────────────────────────
# Push-to-`staging` is the primary trigger. workflow_dispatch lets an operator
# re-run a staging deploy from the Actions tab (e.g. after rotating the
# STAGING_DATABASE_URL secret or after a Cloudflare incident) without an extra
# commit.
#
# Prod's deploy.yml (push-to-`main`) is untouched — its trigger doesn't
# overlap this one's, and `concurrency` is scoped per-environment so a
# staging deploy never queues behind / cancels a prod deploy.
on:
  push:
    # Owner 2026-07-04: staging must TRACK prod — every main release also
    # ships to the staging stack (worker + pages). The legacy push-to-staging
    # trigger stays for ad-hoc staging-only experiments.
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      skip_migrate:
        description: 'Skip pg-migrate step (use when the staging DB is already at the latest schema — e.g. after a prod-snapshot clone)'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  backend:
    runs-on: ubuntu-latest
    # GitHub Environment "Staging" — lets the repo owner add protection rules
    # later (required reviewers, wait timer, secret scoping) without
    # restructuring the workflow. The matching environment for prod is
    # "Production" (see deploy.yml).
    environment: Staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      # Staging also runs on main and supports workflow_dispatch, so it must
      # enforce the same route-capability drift gate as PR/prod CI.
      - run: npm run audit:routes
      - run: npm run typecheck
      - run: npm test
      # Apply pending Postgres migrations against the STAGING Supabase before
      # the Worker swap. STAGING_DATABASE_URL is the staging-only direct
      # connection string — separate secret from prod's DATABASE_URL so a
      # mis-scoped run cannot reach prod. pg-migrate.mjs reads DATABASE_URL
      # from env, so we rebind the env var to the staging secret for this
      # one step only. Same script, isolated target.
      #
      # Migrations are idempotent by convention (IF NOT EXISTS / ON CONFLICT);
      # a deploy with no pending migration files is a no-op against
      # _pg_migrations and exits 0.
      #
      # `skip_migrate` bail-out (workflow_dispatch input only): set to true
      # when the staging DB is known to be at (or ahead of) the latest schema
      # — e.g. after seeding staging from a prod snapshot, or when the pooler
      # credentials are being rotated. push-to-`staging` deploys always run
      # the step (default false).
      # continue-on-error: the free-tier staging Supabase auto-pauses when
      # idle; a paused DB must not fail every prod release's staging mirror.
      # The worker still deploys and the schema heals on the first run after
      # a dashboard Restore.
      - if: ${{ !inputs.skip_migrate }}
        continue-on-error: true
        run: node scripts/pg-migrate.mjs
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          # GitHub-hosted runners have no IPv6 egress. Supabase's pooler
          # hostname resolves to both A and AAAA records; Node 22's default
          # DNS lookup follows the OS's returned order, which on ubuntu-latest
          # can put IPv6 first and Happy-Eyeballs then times out with
          # ENETUNREACH before falling back. Forcing ipv4first sidesteps the
          # dual-stack race entirely. Prod's deploy.yml doesn't need this
          # because it points at a direct-connection hostname that resolves
          # IPv4-only; the pooler is different DNS territory.
          NODE_OPTIONS: --dns-result-order=ipv4first
      # Deploy the Worker to the staging env block in wrangler.toml
      # ([env.staging] → name autocount-sync-api-staging, isolated Hyperdrive,
      # crons=[]). Same Cloudflare account as prod, so the existing
      # CLOUDFLARE_API_TOKEN works — the token's scope (Workers:Edit,
      # Account:Read) already covers both env names.
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          command: deploy --env staging
      # Post-deploy smoke check. STAGING_SMOKE_URL repo VAR overrides the
      # default workers.dev origin if the staging Worker is served from a
      # custom domain. The authed SCM probes need DASHBOARD_API_KEY to run;
      # without it the script logs a WARN and skips them — mirrors the prod
      # behaviour so we don't introduce a new failure mode here.
      - run: node scripts/smoke-check.mjs "${{ vars.STAGING_SMOKE_URL || 'https://autocount-sync-api-staging.houzs-erp.workers.dev' }}"

  # Staging frontend — mirrors deploy.yml's frontend job onto the
  # houzs-erp-staging Pages project, bundle pointed at the staging Worker.
  frontend:
    runs-on: ubuntu-latest
    environment: Staging
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: https://autocount-sync-api-staging.houzs-erp.workers.dev
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: pages deploy ./dist --project-name=houzs-erp-staging --commit-dirty=true
