<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Browser-tab favicon: black mark on transparent (clean on light tab bars).
         The mobile PWA app icon stays the gold-on-dark badge — those come from the
         web manifest (icon-192/512), left unchanged, plus apple-touch-icon for iOS. -->
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#13201c" />
    <meta name="application-name" content="Houzs ERP" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Houzs ERP" />

    <!-- The brand web fonts, self-hosted — no external font origin on first
         paint. /fonts/fonts.css declares the same @font-face set the Google
         Fonts css2 endpoint used to serve here: IBM Plex Sans 400-700,
         IBM Plex Serif 400-700, IBM Plex Mono 400-600, Noto Sans SC
         400/500/700/900, Noto Serif SC 400-900, Caveat 400/600, Archivo
         500-700 — woff2 with unicode-range intact, so a browser still
         downloads only the small CJK range chunks a page actually renders.

         Files live in public/fonts/ and are cached immutable for a year
         (public/_headers), fonts.css included: any change to the font set
         must ship under NEW file names and repoint this link — an in-place
         edit will not reach returning browsers.

         Declared here rather than @import'ed in src/index.css for the same
         reason the external link was: a <link> starts fetching during HTML
         parse, while an `@import` cannot start until the importing stylesheet
         has been fetched and parsed — and would silently no-op anyway once
         the bundler concatenates index.css behind another sheet.

         Keep this in sync with tailwind.config.js fontFamily and the
         --font-script / --font-mark tokens in src/vendor/design-system/
         tokens.css, which is what Caveat and Archivo are here for. -->
    <link rel="stylesheet" href="/fonts/fonts.css" />
    <title>Houzs Century ERP</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
