<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Browser-tab favicon: black mark on transparent (clean on light tab bars).
         The mobile PWA app icon stays the gold-on-dark badge — those come from the
         web manifest (icon-192/512), left unchanged, plus apple-touch-icon for iOS. -->
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#13201c" />
    <meta name="application-name" content="Houzs ERP" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Houzs ERP" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- The brand web fonts. This link used to request a DIFFERENT family set
         (Manrope + Plus Jakarta Sans + IBM Plex Mono) while src/index.css
         requested this one via `@import url(...)`, so every load fetched two
         separate stylesheets from fonts.googleapis.com. Manrope and Plus
         Jakarta Sans were dead: no font-family in the built CSS names either
         (the only mentions left in the tree are stale comments), so ten font
         weights were downloaded for nothing. IBM Plex Mono, the one live family
         in that set, is already in the list below at the same weights.

         The surviving request moved OUT of index.css and up here. An `@import`
         at the top of a stylesheet cannot start until that stylesheet has been
         fetched and parsed, which put the font CSS a full round trip behind the
         bundle CSS, and the font FILES another one behind that — all of it
         render-blocking. Declared here it starts during HTML parse instead,
         alongside the bundle rather than after it. Same fonts, same URL, one
         less serial hop.

         Keep this in sync with tailwind.config.js fontFamily and the
         --font-script / --font-mark tokens in src/vendor/design-system/
         tokens.css, which is what Caveat and Archivo are here for. -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@400;500;600;700;900&family=Caveat:wght@400;600&family=Archivo:wght@500;600;700&display=swap" rel="stylesheet" />
    <title>Houzs Century ERP</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
