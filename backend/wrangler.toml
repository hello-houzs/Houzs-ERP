name = "autocount-sync-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
# Required by @cloudflare/vitest-pool-workers; also enables Node-style
# APIs (Buffer, process.env shims) in production. Purely additive —
# nothing in the worker today depends on the absence of these.
compatibility_flags = ["nodejs_compat"]

[vars]
AUTOCOUNT_API_URL = "https://it-houzs.dev/"
# Inbound AutoCount sync kill switch. "true" = skip every AutoCount pull
# (cron SO/PO/overdue/creditors/stock + manual /api/sync/pull). Non-AutoCount
# cron jobs keep running. Set "true" 2026-06-13 at owner request ("暂时关闭,
# 不需要数据进来"). Flip to "false" + redeploy to resume inbound sync.
AUTOCOUNT_SYNC_DISABLED = "true"
# Public origin used to build email links (survey, portal, supplier invite,
# member invitations, password resets). The canonical user-facing domain —
# pages.dev still serves, but every link we hand out reads this.
PUBLIC_APP_URL = "https://erp.houzscentury.com"
# From address shown on outbound transactional emails (invites, password
# resets, ASSR, etc.). houzscentury.com is verified in Resend (send. SPF +
# resend._domainkey DKIM present in DNS as of 2026-06-13), so we send from
# the company domain rather than the departed dev's it-houzs.dev.
EMAIL_FROM = "Houzs ERP <no-reply@houzscentury.com>"
# Rollback options if houzscentury.com sending ever breaks:
#EMAIL_FROM = "Houzs ERP <no-reply@mail.it-houzs.dev>"
#EMAIL_FROM = "Houzs ERP <onboarding@resend.dev>"

# D1 — legacy. Kept bound through the Supabase cutover so a rollback is a
# one-line revert. Remove once the Postgres cutover is verified in prod.
[[d1_databases]]
binding = "DB"
database_name = "autocount-sync"
database_id = "d0401549-c099-407b-ae95-57a5f85e5ad5"

# Supabase Postgres via Hyperdrive (the cutover target). Project
# ctbaifabbzghtsrmpirm under the COMPANY Supabase account
# (hello@houzscentury.com). The earlier load target xxoszhxglfgkqkokvofa
# was abandoned 2026-06-13 pre-go-live: it lived under the departed
# developer's own account and its password no longer works. Create once:
#   wrangler hyperdrive create houzs-erp-pg \
#     --connection-string="postgresql://postgres.ctbaifabbzghtsrmpirm:<pw>@aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres"
# then uncomment and paste the printed id. Local dev/scripts read DATABASE_URL
# from .dev.vars instead of this binding.
[[hyperdrive]]
binding = "HYPERDRIVE"
# 2026-06-13: the original 4e820fcf went into a persistently-stuck pool state
# (Hyperdrive hangs reaching origin; DB itself healthy via direct connect;
# 15min quiet + pool-rebuild did NOT clear it). f0f9bd0d is a FRESH config over
# the same SG company project (anogrigyjbduyzclzjgn:6543) — deploying with it
# is the most likely revive. A Worker deploy is required to switch the binding;
# the in-session deploy was gate-blocked, so this ships via CI on merge to main.
# Fallback if this also hangs: 4e820fcfa4f945929ab77e164060e694 (the old one).
id = "f0f9bd0d6b924496981b97b9ebcfe898"

# R2 bucket for proof-of-delivery photos and signatures.
[[r2_buckets]]
binding = "POD_BUCKET"
bucket_name = "houzs-erp"

# KV cache for the hydrated session user (services/sessionCache.ts). 60s TTL,
# busted on logout. Pure optimization — auth falls back to the DB if absent.
[[kv_namespaces]]
binding = "SESSION_CACHE"
id = "c25f593faf5a46a2b94155eba91083e1"

# Required secrets (set with `wrangler secret put`):
#   AUTOCOUNT_API_KEY
#   DASHBOARD_API_KEY
#   GOOGLE_MAPS_API_KEY  — used by the planner geocoder (Phase 2)
#   RESEND_API_KEY       — transactional email (see src/services/email.ts).
#                          If unset the email service silently no-ops so
#                          deploys never break on missing keys.

[triggers]
# Cron schedule (kept under the Workers free-plan trigger cap):
#   */5    → SO incremental pull (tight — ops users see new orders fast)
#   */30   → PO pull (docs + outstanding lines). Procurement changes slowly,
#            hitting AutoCount every 5 min is overkill.
#   0 2    → Daily batch: overdue auto-extend, SLA escalation, project
#            reminders, creditors resync, stock-items refresh, weekly
#            streak rollover + leaderboard cache refresh (mig 055), AND
#            monthly gifting reset — idempotent on `users.gifting_reset_at`,
#            so daily-running it is harmless and the actual grant happens
#            on the 1st of each month.
crons = [
  "*/5 * * * *",
  "*/30 * * * *",
  "0 2 * * *"
]

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]